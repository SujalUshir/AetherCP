<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <h1>AetherCP</h1>

  <div id="problemName">Loading...</div>

  <div id="timer">00:00:00</div>

  <div id="todayTime">
    Today's Time: 0 min
  </div>

  <section class="popupSection" id="authSection" aria-labelledby="authSectionTitle">
    <h2 id="authSectionTitle" style="display: none;">Authentication</h2>
    <div id="authLoading">Loading authentication...</div>
    <div id="authLoggedOut" style="display: none;">
      <button id="googleSignInBtn" class="authButton googleBtn">
        <svg class="googleIcon" viewBox="0 0 24 24" width="16" height="16">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.86-4.53-5.84-4.53z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        <span>Continue with Google</span>
      </button>
    </div>
    <div id="authLoggedIn" style="display: none;">
      <div class="userContainer">
        <img id="userAvatar" class="userAvatar" alt="" referrerpolicy="no-referrer">
        <div class="userDetails">
          <span class="userName" id="userName">Loading...</span>
          <span class="userEmail" id="userEmail">Loading...</span>
          <div class="statusRow">
            <span class="authStatus" id="authStatus">Connected</span>
            <span class="syncStatus" id="syncStatus">☁ Synced</span>
          </div>
          <span class="lastBackup" id="lastBackup">Last Backup: Never</span>
        </div>
        <button id="signOutBtn" class="authButton signOutBtn">Sign Out</button>
      </div>
    </div>
  </section>

  <section class="popupSection" aria-labelledby="todayStatsTitle">
    <h2 id="todayStatsTitle">Today's Stats</h2>
    <div class="statRow">
      <span>Time</span>
      <strong id="analyticsTime">00:00:00</strong>
    </div>
    <div class="statRow">
      <span>Problems</span>
      <strong id="analyticsProblems">0</strong>
    </div>
    <div class="statRow">
      <span>Most Worked</span>
      <strong id="analyticsMostWorked">None</strong>
    </div>
  </section>

  <section class="popupSection" aria-labelledby="recentProblemsTitle">
    <h2 id="recentProblemsTitle">Recent Problems</h2>
    <div id="recentProblemsList" class="problemList"></div>
  </section>

  <section class="popupSection" id="cphSection" aria-labelledby="cphSectionTitle">
    <h2 id="cphSectionTitle">VS Code</h2>
    <div class="statRow">
      <span>CPH Receiver</span>
      <strong id="cphStatusText" class="cphStatus cphStatusChecking">Checking...</strong>
    </div>
    <button id="cphSendBtn" class="cphButton" disabled>Open in VS Code</button>
  </section>

  <script src="../shared/constants.js"></script>
  <script src="../utils/time.js"></script>
  <script src="popup.js"></script>

</body>
</html>
